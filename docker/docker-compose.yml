version: '3'

services:
  stigid:
    build:
      context: ../
      dockerfile: ./docker/node/Dockerfile
    container_name: stigid
    image: ${DOCKER_REGISTRY}/stigid
    restart: unless-stopped
    ports:
      - ${PORT}:${PORT}
    environment:
      APP:
      PORT:
      EXTERNAL_URL:
      DB_HOST:
      DB_USER:
      DB_PASSWORD:
      NODE_ENV: ${NODE_ENV:-production}
